name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-code-review:
    # Run on PR events (skip if triggered by Copilot bot), or on PR review comments that mention @claude
    if: |
      (github.event_name == 'pull_request' && github.actor != 'Copilot' && github.actor != 'copilot' && github.actor != 'copilot[bot]') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "claude-code"
          # Prompt for Claude code review
          prompt: |
            Review this pull request. Focus on:
            - Code quality and best practices for .NET
            - Potential bugs or issues
            - Test coverage
            - Security concerns
          # Custom trigger phrase - users can comment "@claude" to invoke
          trigger_phrase: "@claude"
